<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading SIMATS Browser...</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; }
        .progress-container { background: #e0e0e0; border-radius: 8px; width: 100%; height: 24px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { background: #3498db; height: 100%; width: 0%; transition: width 0.1s; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px;}
        .status-text { font-size: 14px; color: #555; font-weight: bold; margin-bottom: 15px;}
        
        /* 32-Connection Visual Grid */
        .chunk-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 15px; }
        .chunk { height: 15px; width: 100%; background: #e0e0e0; border-radius: 2px; }
        .chunk.done { background: #2ecc71; }
        
        .title { font-size: 20px; color: #2c3e50; margin-bottom: 5px; font-weight: bold;}
        .subtitle { font-size: 13px; color: #7f8c8d; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">SIMATS Browser V4.0</div>
        <div class="subtitle">Fast-Download Mode Activated (32 Threads)</div>
        
        <div class="status-text" id="statusText">Connecting to server...</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>
        
        <div class="chunk-grid" id="chunkGrid">
            <!-- 32 connection boxes generated by JS -->
        </div>
        
        <div style="margin-top: 25px; font-size: 12px; color: #999;">
            <p>Please wait. The SIMATS Browser (.exe) will prompt to save once all 32 connections finish stitching.</p>
        </div>
    </div>

    <script>
        // The direct raw download link to your compiled EXE on GitHub
        const FILE_URL = "https://github.com/Bhuvispartiate/simats-browser/releases/download/v4.0/simats.exe";
        const CONNECTIONS = 32;

        async function startMultiThreadDownload() {
            try {
                // 1. Setup the 32 visual connection boxes
                const grid = document.getElementById('chunkGrid');
                for(let i=0; i < CONNECTIONS; i++) {
                    const d = document.createElement('div');
                    d.className = 'chunk';
                    d.id = 'chunk-' + i;
                    grid.appendChild(d);
                }

                document.getElementById('statusText').innerText = "Analyzing file size...";
                
                // 2. Ask GitHub exactly how large the EXE is
                const response = await fetch(FILE_URL, { method: 'HEAD' });
                const fileSize = parseInt(response.headers.get('content-length'));
                
                if (!fileSize) throw new Error("Could not determine file size constraints.");

                const chunkSize = Math.ceil(fileSize / CONNECTIONS);
                let chunks = new Array(CONNECTIONS);
                let completedChunks = 0;

                document.getElementById('statusText').innerText = `Downloading ${Math.round(fileSize/1024/1024)} MB...`;

                // 3. Launch 32 simultaneous parallel connections
                const downloadPromises = [];
                for (let i = 0; i < CONNECTIONS; i++) {
                    const startByte = i * chunkSize;
                    const endByte = Math.min((i + 1) * chunkSize - 1, fileSize - 1);

                    // Fetch specific parts of the EXE
                    const downloadTask = fetch(FILE_URL, {
                        headers: { 'Range': `bytes=${startByte}-${endByte}` }
                    }).then(res => res.arrayBuffer()).then(buffer => {
                        chunks[i] = buffer;
                        completedChunks++;
                        
                        // Update the UI progress bar and boxes
                        document.getElementById('chunk-' + i).classList.add('done');
                        const percent = Math.round((completedChunks / CONNECTIONS) * 100);
                        document.getElementById('progressBar').style.width = percent + '%';
                        document.getElementById('progressBar').innerText = percent + '%';
                        
                        if (percent === 100) {
                             document.getElementById('statusText').innerText = `Stitching 32 parts together...`;
                        } else {
                             document.getElementById('statusText').innerText = `Downloading threads...`;
                        }
                    }).catch(err => {
                        console.error("Connection thread failed: ", i, err);
                        throw err;
                    });
                    
                    downloadPromises.push(downloadTask);
                }

                // 4. Wait for all 32 streams to finish
                await Promise.all(downloadPromises);

                document.getElementById('statusText').innerText = "Download Complete! Ready to Run.";

                // 5. Stitch the 32 pieces together instantly in memory
                const blob = new Blob(chunks, { type: 'application/octet-stream' });
                
                // 6. Force Chrome/Edge to save the built file as an EXE
                const finalUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = finalUrl;
                a.download = 'simats.exe';
                document.body.appendChild(a);
                a.click(); // Trigger the download
                
                // Clean up memory
                setTimeout(() => { URL.revokeObjectURL(finalUrl); a.remove(); }, 2000);

            } catch (error) {
                document.getElementById('statusText').innerText = "Accelerated download failed. Falling back...";
                // Fallback: If 32 connections fail (cors/adblock issues), just standard download the EXE
                setTimeout(() => { window.location.href = FILE_URL; }, 1500);
            }
        }

        // Start right when the page loads
        window.onload = startMultiThreadDownload;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading SIMATS Browser...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 450px;
            position: relative;
        }

        .progress-container {
            background: #e0e0e0;
            border-radius: 8px;
            width: 100%;
            height: 24px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            background: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .status-text {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .title {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
        }

        .btn:hover {
            background: #34495e;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">SIMATS Browser V4.0</div>

        <div class="status-text" id="statusText">Starting Fast Download...</div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">Wait...</div>
        </div>

        <div style="margin-top: 25px; font-size: 13px; color: #666;">
            <p>Your download is starting via standard high-speed secure CDN.</p>
            <p>If it doesn't start automatically in 3 seconds, click below:</p>
            <a href="https://github.com/Bhuvispartiate/simats-browser/releases/download/v4.0/simats.exe" class="btn"
                id="manualBtn">Download SIMATS.exe</a>
        </div>
    </div>

    <script>
        // Because GitHub's AWS S3 CDN strictly blocks cross-origin (CORS) Range requests,
        // we cannot do the 32-thread slicing natively in JS without a paid proxy server.
        // Doing the traditional single-connection download is heavily optimized by GitHub's CDN.

        const TARGET_URL = "https://github.com/Bhuvispartiate/simats-browser/releases/download/v4.0/simats.exe";

        window.onload = function () {
            let progress = 0;
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('statusText');

            // Just a visual cue that a process is starting
            const interval = setInterval(() => {
                progress += 5;
                if (progress <= 100) {
                    bar.style.width = progress + '%';
                    bar.innerText = 'Connecting...';
                } else {
                    clearInterval(interval);
                    bar.style.width = '100%';
                    bar.style.background = '#2ecc71';
                    bar.innerText = 'Downloading... Check your browser downloads bar!';
                    text.innerText = 'Connection Established.';

                    // Trigger the true underlying download
                    window.location.href = TARGET_URL;
                }
            }, 100);
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading SIMATS Browser...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 450px;
        }

        .title {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
        }

        .btn:hover {
            background: #27ae60;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">SIMATS Browser V4.0</div>

        <div class="spinner" id="spinner"></div>

        <div id="statusText" style="font-weight: bold; color: #555;">Downloading Fast Installer (8 KB)...</div>

        <div style="margin-top: 25px; font-size: 13px; color: #666;">
            <p>1. Open the downloaded <b>SIMATS-Setup.exe</b></p>
            <p>2. It will speed-download the browser using 32 threads.</p>
            <p>3. The browser will launch instantly!</p>
            <br>
            <a href="SIMATS-Setup.exe" class="btn" id="manualBtn">Download Setup Manually</a>
        </div>
    </div>

    <script>
        window.onload = function () {
            setTimeout(() => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').innerText = 'Please open SIMATS-Setup.exe to start!';
                document.getElementById('statusText').style.color = '#2ecc71';
                window.location.href = "SIMATS-Setup.exe";
            }, 1000);
        }
    </script>
</body>

</html>
